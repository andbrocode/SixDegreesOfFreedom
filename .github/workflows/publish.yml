# Publish sixdegrees to PyPI on GitHub Release (Trusted Publishing / OIDC).
#
# --- PyPI Trusted Publisher (exact match required) ---
# https://pypi.org/manage/account/publishing/   (pending, first release)
# or project → Publishing settings               (existing project)
#
#   PyPI project name:  sixdegrees
#   Owner:              andbrocode
#   Repository:         SixDegreesOfFreedom
#   Workflow name:      publish.yml          ← filename only, not a path
#   Environment name:   (leave EMPTY)        ← must match this workflow
#
# `invalid-publisher` usually means one of those fields does not match
# the OIDC claims from this job (especially Environment and Workflow).
#
# Publish:
#   1. Bump __version__ in src/sixdegrees/__init__.py
#   2. Create a GitHub Release (e.g. tag v1.0.3)

name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # required for Trusted Publishing (OIDC)

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
